name: "购物车功能测试"
description: "测试购物车的添加、查询功能"
steps:
  - name: "用户登录"
    url: "http://localhost:5000/api/login"
    method: "POST"
    headers:
      Content-Type: "application/json"
    json:
      username: "user1"
      password: "123456"
    extract:
      token: "$.data.token"
    validate:
      - equals: {"code": 200}

  - name: "添加商品到购物车"
    url: "http://localhost:5000/api/cart"
    method: "POST"
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{token}}"
    json:
      product_id: 1
      quantity: 1
    validate:
      - equals: {"code": 200}

  - name: "获取购物车列表"
    url: "http://localhost:5000/api/cart"
    method: "GET"
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{token}}"
    validate:
      - equals: {"code": 200}
      - contains: {"text": "items"}
