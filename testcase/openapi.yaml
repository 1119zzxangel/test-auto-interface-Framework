      summary: 获取评论列表
      description: 管理端获取所有评论列表，支持筛选和搜索
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
        - name: status
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: keyword
          in: query
          schema:
            type: string
          description: 搜索商品名称或评论内容
      responses:
        '200':
          description: 评论列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageResponse'
                properties:
                  data:
                    properties:
                      list:
                        type: array
                        items:
                          $ref: '#/components/schemas/Review'

  /api/admin/reviews/{review_id}/status:
    put:
      tags:
        - 管理端-评论
      summary: 更新评论状态
      description: 显示或隐藏评论
      security:
        - bearerAuth: []
      parameters:
        - name: review_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: integer
                  enum: [0, 1]
                  description: 0-隐藏，1-显示
                  example: 1
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    $ref: '#/components/schemas/Review'

  /api/admin/reviews/{review_id}:
    delete:
      tags:
        - 管理端-评论
      summary: 删除评论
      description: 删除指定评论
      security:
        - bearerAuth: []
      parameters:
        - name: review_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功

